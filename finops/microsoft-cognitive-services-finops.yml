specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Microsoft Cognitive Services
providerId: microsoft-cognitive-services
publisherName: Microsoft Cognitive Services
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Azure AI
  - Computer Vision
  - Speech
  - NLP
  - OpenAI
  - Machine Learning
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Microsoft Cognitive Services API surface. Provides a
  FOCUS-aligned mapping for cost allocation, usage measurement, and unit-economics reporting across the
  provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Microsoft Cognitive Services
  ServiceCategory: Developer Tools / API
  ProviderName: Microsoft Cognitive Services
  PublisherName: Microsoft Cognitive Services
  InvoiceIssuerName: Microsoft Cognitive Services
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Azure AI Vision API
    baseURL: https://westus.api.cognitive.microsoft.com/
    tags:
      - Computer Vision
      - Image Analysis
      - OCR
      - Azure AI
    serviceName: Azure AI Vision API
    serviceCategory: API
  - name: Azure AI Speech API
    baseURL: https://westus.stt.speech.microsoft.com/
    tags:
      - Speech
      - Text to Speech
      - Speech to Text
      - Azure AI
    serviceName: Azure AI Speech API
    serviceCategory: API
  - name: Azure AI Language API
    baseURL: https://api.cognitive.microsoft.com/
    tags:
      - NLP
      - Text Analytics
      - Language Understanding
      - Azure AI
    serviceName: Azure AI Language API
    serviceCategory: API
  - name: Azure OpenAI Service API
    baseURL: https://api.cognitive.microsoft.com/
    tags:
      - OpenAI
      - GPT
      - Large Language Models
      - Azure AI
    serviceName: Azure OpenAI Service API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
